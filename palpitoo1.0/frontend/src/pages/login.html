<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Palpitoo - Entrar no Jogo</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Salsa&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="./css/style.css">
  <meta name="description" content="Palpitoo — A Resenha Virou Campeonato. Palpites de futebol com amigos.">
  <link rel="icon" href="./img/pato.png" type="image/png">
  <style>
    #container-avisos { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
    .aviso-toast { display: flex; align-items: center; gap: 10px; padding: 12px 18px; border-radius: 12px; font-family: 'Russo One', sans-serif; font-size: 13px; color: #fff; box-shadow: 0 4px 20px rgba(0,0,0,0.4); animation: entrar 0.3s ease; min-width: 260px; }
    .aviso-sucesso { background: #166534; border: 1px solid #22c55e; }
    .aviso-erro    { background: #7f1d1d; border: 1px solid #ef4444; }
    .aviso-info    { background: #1e3a5f; border: 1px solid #3b82f6; }
    .aviso-saindo  { animation: sair 0.3s ease forwards; }
    @keyframes entrar { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }
    @keyframes sair   { to   { opacity:0; transform: translateY(10px); } }
  </style>
</head>
<body>
  <script>
    if (!localStorage.getItem('craqueId')) {} // página pública, sem redirect
  </script>
  <div id="container-avisos"></div>

  <script>
    function mostrarAviso(msg, tipo = 'info') {
      const cont  = document.getElementById('container-avisos');
      const toast = document.createElement('div');
      const icone = tipo === 'sucesso' ? '✅' : tipo === 'erro' ? '❌' : 'ℹ️';
      toast.className = `aviso-toast aviso-${tipo}`;
      toast.innerHTML = `<span>${icone}</span><span>${msg}</span>`;
      cont.appendChild(toast);
      setTimeout(() => { toast.classList.add('aviso-saindo'); setTimeout(() => toast.remove(), 300); }, 3500);
    }
  </script>

  <main class="hero-section" style="justify-content: center; width: 100%;">
    <div class="login-area" style="justify-content: center; width: 100%;">
      
      <div class="login-card animacao-suave">
        <div class="login-header">
          <h3 class="font-russo" style="color: var(--accent-cyan);">Palpitoo</h3>
          <p>Entre com sua conta de craque</p>
        </div>

        <form id="meuFormulario">
          
          <div class="form-group">
            <label for="campoEmail">E-mail</label>
            <input id="campoEmail" type="email" placeholder="Seu E-mail" required>
          </div>
          
          <div class="form-group">
            <label for="campoSenha">Senha</label>
            <input id="campoSenha" type="password" placeholder="Sua Senha" required>
          </div>

          <button type="button" onclick="fazerLogin()" class="btn-primary">
            Entrar
          </button>
        </form>

        <div class="login-footer">
          Ainda não tem conta? <a href="cadastro.html" class="btn-link">Cadastre-se</a>
        </div>
      </div>

    </div>
  </main>

  <script>
    async function fazerLogin() {
      const email = document.getElementById('campoEmail').value;
      const senha = document.getElementById('campoSenha').value;
      const btn   = document.querySelector('.btn-primary');

      if (!email || !senha) {
        mostrarAviso('Preencha e-mail e senha para entrar.', 'erro');
        return;
      }

      btn.innerText = 'Entrando...';
      btn.disabled  = true;

      try {
        const resposta = await fetch('https://palpitoo-api.onrender.com/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, senha })
        });

        const resultado = await resposta.json();

        if (resposta.ok) {
          mostrarAviso(resultado.mensagem || 'Login realizado!', 'sucesso');
          localStorage.setItem('craqueId',     resultado.usuario.id);
          localStorage.setItem('nome_craque',  resultado.usuario.nome);
          localStorage.setItem('time_craque',  resultado.usuario.time);
          localStorage.setItem('email_craque', resultado.usuario.email);
          localStorage.setItem('foto_craque',  resultado.usuario.foto_perfil || resultado.usuario.foto || '');
          setTimeout(() => window.location.href = 'index.html', 1000);
        } else {
          mostrarAviso(resultado.erro || 'Erro ao entrar.', 'erro');
          btn.innerText = 'Entrar';
          btn.disabled  = false;
        }

      } catch (error) {
        mostrarAviso('Servidor offline. Tente novamente.', 'erro');
        btn.innerText = 'Entrar';
        btn.disabled  = false;
      }
    }
  </script>

</body>
</html>
